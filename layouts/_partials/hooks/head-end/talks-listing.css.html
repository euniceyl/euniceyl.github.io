<style>
  .talks-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
  }

    .talks-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  .talk-card {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgb(229 231 235);
    border-radius: 0.5rem;
    background: rgb(255 255 255);
  }

  .dark .talk-card {
    border-color: rgb(55 65 81);
    background: rgb(17 24 39);
  }

  .talk-card-header {
    padding: 1rem 1.25rem 0.75rem;
  }

  .talk-card-label {
    margin: 0;
    font-size: 1.125rem;
    font-weight: 600;
    line-height: 1.4;
    color: rgb(37 99 235);
  }

  .dark .talk-card-label {
    color: rgb(96 165 250);
  }

  .talk-card-title {
    margin: 0.35rem 0 0;
    font-size: 0.875rem;
    line-height: 1.45;
    color: rgb(75 85 99);
  }

  .dark .talk-card-title {
    color: rgb(156 163 175);
  }

  .talk-card-venue {
    margin: 0.25rem 0 0;
    font-size: 0.8125rem;
    line-height: 1.45;
    color: rgb(107 114 128);
  }

  .dark .talk-card-venue {
    color: rgb(156 163 175);
  }

  .talk-card-media {
    padding: 0 1rem 1rem;
  }

  .talk-embed {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 0.375rem;
    background: rgb(0 0 0);
  }

  .talk-embed--video,
  .talk-embed--slides {
    aspect-ratio: 16 / 9;
  }

  .talk-embed-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Compact Hugo slides embed inside cards */
  .talk-card-media .mb-12 {
    margin-bottom: 0 !important;
  }

  .talk-card-media [x-ref="slideContainer"] {
    border-radius: 0.375rem;
  }

  .talk-poster-link {
    display: block;
  }

  .talk-poster-image {
    display: block;
    width: 100%;
    height: auto;
    max-height: 520px;
    border-radius: 0.375rem;
    border: 1px solid rgb(229 231 235);
    object-fit: contain;
    background: rgb(249 250 251);
  }

  .dark .talk-poster-image {
    border-color: rgb(55 65 81);
    background: rgb(31 41 55);
  }

  .talk-card-media--deck {
    padding-bottom: 0.75rem;
  }

  .talk-slide-deck {
    width: 100%;
  }

  .talk-slide-deck-viewport {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 0.375rem;
    border: 1px solid rgb(229 231 235);
    background: rgb(249 250 251);
  }

  .dark .talk-slide-deck-viewport {
    border-color: rgb(55 65 81);
    background: rgb(31 41 55);
  }

  .talk-slide-deck-image {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .talk-slide-deck-image.is-hidden {
    display: none;
  }

  .talk-slide-deck-nav {
    position: absolute;
    top: 50%;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    margin: 0;
    padding: 0;
    border: 1px solid rgb(229 231 235);
    border-radius: 9999px;
    background: rgb(255 255 255 / 0.95);
    color: rgb(55 65 81);
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    transform: translateY(-50%);
    transition: background-color 0.15s ease, opacity 0.15s ease;
  }

  .talk-slide-deck-nav:hover:not(:disabled) {
    background: rgb(255 255 255);
  }

  .talk-slide-deck-nav:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .talk-slide-deck-nav--prev {
    left: 0.5rem;
  }

  .talk-slide-deck-nav--next {
    right: 0.5rem;
  }

  .dark .talk-slide-deck-nav {
    border-color: rgb(75 85 99);
    background: rgb(31 41 55 / 0.95);

  }

    font-size: 0.75rem;

  .dark .talk-card-placeholder {
    border-color: rgb(75 85 99);
    background: rgb(31 41 55);
    color: rgb(107 114 128);
  }
